<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#121212" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="IN/OUT" />
  <title>IN / OUT Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #121212; color: #eee; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
    #app { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
    .appbar { background: #1a1a1a; padding: 16px; display: flex; align-items: center; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 10; }
    .appbar-title { flex: 1; font-size: 18px; font-weight: 700; }
    .icon-btn { background: none; border: none; color: #ccc; font-size: 24px; cursor: pointer; padding: 4px 8px; }
    .back-btn { background: none; border: none; color: #1DB954; font-size: 30px; cursor: pointer; padding: 0 12px 0 0; line-height: 1; }
    .save-btn { background: #1DB954; border: none; color: #000; font-weight: 700; font-size: 14px; border-radius: 10px; padding: 8px 18px; cursor: pointer; }
    .screen { display: none; padding: 14px; flex: 1; }
    .screen.active { display: block; }
    .hint { text-align: center; font-size: 12px; color: #555; margin-bottom: 14px; }
    .card { background: #1e1e1e; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border: 1.5px solid #2a2a2a; transition: border-color 0.2s; }
    .card.in  { border-color: #1DB954; }
    .card.out { border-color: #E53935; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 16px; font-weight: 700; }
    .card-ts { font-size: 11px; color: #555; margin-top: 3px; font-family: monospace; }
    .btn-group { display: flex; gap: 8px; }
    .status-btn { width: 58px; height: 44px; border-radius: 12px; font-weight: 700; font-size: 13px; cursor: pointer; border: none; transition: all 0.15s; }
    .status-btn:active { transform: scale(0.93); }
    .btn-in  { background: #0a2a0a; color: #1DB954; }
    .btn-in.active  { background: #1DB954; color: #000; }
    .btn-out { background: #2a0a0a; color: #E53935; }
    .btn-out.active { background: #E53935; color: #fff; }
    .log-box { background: #181818; border-radius: 14px; padding: 14px; margin-top: 16px; border: 1px solid #2a2a2a; }
    .log-title { font-size: 10px; color: #555; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .log-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .log-badge { font-size: 10px; font-weight: 700; border-radius: 6px; padding: 2px 7px; }
    .log-badge.in  { background: #1DB954; color: #000; }
    .log-badge.out { background: #E53935; color: #fff; }
    .log-name { flex: 1; font-weight: 500; }
    .log-ts { font-size: 10px; color: #555; font-family: monospace; }
    .section-label { font-size: 10px; color: #555; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .setting-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .setting-idx { color: #555; font-size: 13px; width: 20px; text-align: right; flex-shrink: 0; }
    .setting-input { flex: 1; background: #1e1e1e; border: 1px solid #333; border-radius: 10px; color: #eee; font-size: 15px; padding: 10px 12px; outline: none; font-family: inherit; }
    .setting-input:focus { border-color: #1DB954; }
    .remove-btn { background: none; border: none; color: #E53935; font-size: 20px; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
    .add-btn { width: 100%; background: none; border: 1px dashed #333; border-radius: 10px; color: #1DB954; font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .connected-box { margin-top: 24px; padding: 12px 14px; background: #0a1a0a; border-radius: 12px; border: 1px solid #1a3a1a; font-size: 12px; color: #6a9a6a; line-height: 1.7; }
    .connected-box code { font-size: 11px; color: #4a7a4a; word-break: break-all; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: #222; border: 1px solid #333; color: #fff; font-size: 13px; font-weight: 600; padding: 12px 22px; border-radius: 100px; white-space: nowrap; opacity: 0; transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s; z-index: 999; max-width: calc(100vw - 32px); pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <div class="appbar" id="appbar">
    <div class="appbar-title">IN / OUT Tracker</div>
    <button class="icon-btn" id="btn-settings">⚙</button>
  </div>
  <div class="screen active" id="screen-main">
    <p class="hint">TAP IN OR OUT TO LOG TO GOOGLE SHEETS</p>
    <div id="cards"></div>
    <div class="log-box" id="log-box" style="display:none">
      <div class="log-title">Recent Activity</div>
      <div id="log-list"></div>
    </div>
  </div>
  <div class="screen" id="screen-settings">
    <div class="section-label">People</div>
    <div id="settings-people"></div>
    <button class="add-btn" id="btn-add-person">＋ Add Person</button>
    <div class="connected-box">
      ✓ Sending to Google Sheet:<br>
      <code>1UACBHy1YvoPgqWxwoC6iGHu8RSJApNn5HAR_QiEG55U</code>
    </div>
  </div>
</div>
<div id="toast"></div>
<iframe id="hidden-iframe" name="hidden-iframe" style="display:none"></iframe>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEVlmC8o8OViqDgnbIkx-xnRc5QZOeEP_0dQlU_XRylx-PS8TEd-xWyN19VnExLp8-Hw/exec";
const BUTTONS_KEY = "iot_buttons";

let buttons = JSON.parse(localStorage.getItem(BUTTONS_KEY) || "null") || [
  { id: 1, name: "Alice" },
  { id: 2, name: "Bob" },
  { id: 3, name: "Charlie" },
];
let statuses = {};
let actLog   = [];

// ── FIX: Initialize nextId from the max existing id to avoid collisions on reload ──
let nextId = Math.max(99, ...buttons.map(function(b) { return b.id; })) + 1;

function saveButtons() {
  localStorage.setItem(BUTTONS_KEY, JSON.stringify(buttons));
}

function getTs() {
  return new Date().toLocaleString("en-US", {
    month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit", second: "2-digit"
  });
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, bg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.background = bg || "#222";
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

// ── Submit via Image GET (simplest, works everywhere) ────────────────────────
function submitToSheet(name, status, timestamp) {
  return new Promise((resolve) => {
    const url = SCRIPT_URL
      + "?name="      + encodeURIComponent(name)
      + "&status="    + encodeURIComponent(status)
      + "&timestamp=" + encodeURIComponent(timestamp);
    const img = new Image();
    img.onload  = () => resolve(true);
    img.onerror = () => resolve(true); // Apps Script returns text not image, so onerror = request reached server
    img.src = url;
    setTimeout(() => resolve(true), 8000);
  });
}

// ── Toggle ───────────────────────────────────────────────────────────────────
async function toggle(id, name, newStatus) {
  const timestamp = getTs();
  statuses[id] = { status: newStatus, ts: timestamp };
  actLog.unshift({ name, status: newStatus, ts: timestamp });
  if (actLog.length > 50) actLog.pop();
  renderCards();
  renderLog();
  showToast("Sending " + name + " → " + newStatus.toUpperCase() + "...", "#333");
  const ok = await submitToSheet(name, newStatus.toUpperCase(), timestamp);
  showToast(
    ok ? "✓ " + name + " → " + newStatus.toUpperCase() : "⚠ Network error",
    newStatus === "in" ? "#0a3a0a" : "#3a0a0a"
  );
}

// ── Render Cards ─────────────────────────────────────────────────────────────
function renderCards() {
  const container = document.getElementById("cards");
  container.innerHTML = "";

  buttons.forEach(function(btn) {
    const info    = statuses[btn.id];
    const current = info ? info.status : "none";

    const card = document.createElement("div");
    card.className = "card" + (current !== "none" ? " " + current : "");

    const cardInfo = document.createElement("div");
    cardInfo.className = "card-info";

    const nameEl = document.createElement("div");
    nameEl.className = "card-name";
    nameEl.textContent = btn.name;
    cardInfo.appendChild(nameEl);

    if (info) {
      const tsEl = document.createElement("div");
      tsEl.className = "card-ts";
      tsEl.textContent = info.ts;
      cardInfo.appendChild(tsEl);
    }

    const btnGroup = document.createElement("div");
    btnGroup.className = "btn-group";

    const btnIn = document.createElement("button");
    btnIn.className = "status-btn btn-in" + (current === "in" ? " active" : "");
    btnIn.textContent = "IN";
    btnIn.addEventListener("click", (function(b) {
      return function() { toggle(b.id, b.name, "in"); };
    })(btn));

    const btnOut = document.createElement("button");
    btnOut.className = "status-btn btn-out" + (current === "out" ? " active" : "");
    btnOut.textContent = "OUT";
    btnOut.addEventListener("click", (function(b) {
      return function() { toggle(b.id, b.name, "out"); };
    })(btn));

    btnGroup.appendChild(btnIn);
    btnGroup.appendChild(btnOut);
    card.appendChild(cardInfo);
    card.appendChild(btnGroup);
    container.appendChild(card);
  });
}

// ── Render Log ───────────────────────────────────────────────────────────────
function renderLog() {
  const box  = document.getElementById("log-box");
  const list = document.getElementById("log-list");
  if (!actLog.length) { box.style.display = "none"; return; }
  box.style.display = "block";
  list.innerHTML = "";
  actLog.slice(0, 8).forEach(function(e) {
    const row = document.createElement("div");
    row.className = "log-row";
    row.innerHTML = '<span class="log-badge ' + e.status + '">' + e.status.toUpperCase() + '</span>';
    const nameEl = document.createElement("span");
    nameEl.className = "log-name";
    nameEl.textContent = e.name;
    const tsEl = document.createElement("span");
    tsEl.className = "log-ts";
    tsEl.textContent = e.ts;
    row.appendChild(nameEl);
    row.appendChild(tsEl);
    list.appendChild(row);
  });
}

// ── Settings ─────────────────────────────────────────────────────────────────
function openSettings() {
  const appbar = document.getElementById("appbar");
  appbar.innerHTML = "";

  const backBtn = document.createElement("button");
  backBtn.className = "back-btn";
  backBtn.textContent = "‹";
  backBtn.addEventListener("click", closeSettings);

  const title = document.createElement("div");
  title.className = "appbar-title";
  title.style.flex = "1";
  title.textContent = "Settings";

  const saveBtn = document.createElement("button");
  saveBtn.className = "save-btn";
  saveBtn.textContent = "Save";
  saveBtn.addEventListener("click", saveSettings);

  appbar.appendChild(backBtn);
  appbar.appendChild(title);
  appbar.appendChild(saveBtn);

  document.getElementById("screen-main").classList.remove("active");
  document.getElementById("screen-settings").classList.add("active");
  renderSettingsPeople();
}

function closeSettings() {
  const appbar = document.getElementById("appbar");
  appbar.innerHTML = "";

  const title = document.createElement("div");
  title.className = "appbar-title";
  title.textContent = "IN / OUT Tracker";

  const settingsBtn = document.createElement("button");
  settingsBtn.className = "icon-btn";
  settingsBtn.textContent = "⚙";
  settingsBtn.addEventListener("click", openSettings);

  appbar.appendChild(title);
  appbar.appendChild(settingsBtn);

  document.getElementById("screen-settings").classList.remove("active");
  document.getElementById("screen-main").classList.add("active");
}

function saveSettings() {
  buttons = [];
  document.querySelectorAll("#settings-people .setting-row").forEach(function(row) {
    const name = row.querySelector("input").value.trim();
    const id   = parseInt(row.dataset.id);
    if (name) buttons.push({ id: id, name: name });
  });
  saveButtons();
  // ── FIX: Re-sync nextId after saving so new additions never collide ──
  nextId = Math.max(99, ...buttons.map(function(b) { return b.id; })) + 1;
  renderCards();
  renderLog();
  closeSettings();
  showToast("Settings saved ✓", "#0a3a0a");
}

function renderSettingsPeople() {
  const container = document.getElementById("settings-people");
  container.innerHTML = "";
  buttons.forEach(function(btn, i) {
    container.appendChild(createSettingRow(btn.id, btn.name, i + 1));
  });
}

function createSettingRow(id, name, index) {
  const row = document.createElement("div");
  row.className = "setting-row";
  row.dataset.id = id;

  const idx = document.createElement("span");
  idx.className = "setting-idx";
  idx.textContent = index;

  const input = document.createElement("input");
  input.className = "setting-input";
  input.value = name;
  input.placeholder = "Name...";
  input.maxLength = 30;

  const removeBtn = document.createElement("button");
  removeBtn.className = "remove-btn";
  removeBtn.textContent = "✕";
  removeBtn.addEventListener("click", function() {
    row.remove();
    reindex();
  });

  row.appendChild(idx);
  row.appendChild(input);
  row.appendChild(removeBtn);
  return row;
}

function addPerson() {
  const container = document.getElementById("settings-people");
  const count = container.querySelectorAll(".setting-row").length + 1;
  const row = createSettingRow(nextId++, "", count);
  container.appendChild(row);
  row.querySelector("input").focus();
}

function reindex() {
  document.querySelectorAll("#settings-people .setting-row").forEach(function(r, i) {
    r.querySelector(".setting-idx").textContent = i + 1;
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById("btn-settings").addEventListener("click", openSettings);
document.getElementById("btn-add-person").addEventListener("click", addPerson);
renderCards();
</script>
</body>
</html>
